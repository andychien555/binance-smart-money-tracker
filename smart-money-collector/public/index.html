<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Smart Money Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
  :root {
    /* Surfaces — Linear near-neutral charcoal layering */
    --bg:        #08090a;
    --surface:   #0f1011;
    --surface-2: #161718;
    --line:      #23252a;
    --line-soft: #1a1b1d;
    /* Text — Linear 3-tier grey */
    --fg:    #f7f8f8;
    --fg-2:  #b4b8c0;
    --fg-3:  #8b8f97;
    /* Accent — Neon Lime, used sparingly */
    --accent:    #e4f222;
    --accent-fg: #08090a;
    /* Chart series — Linear palette + amber */
    --bull:   #27a644;
    --bear:   #eb5757;
    --blue:   #5e6ad2;
    --cyan:   #02b8cc;
    --violet: #8b5cf6;
    --amber:  oklch(0.78 0.10 75);
    --bull-fill: rgb(39 166 68 / 0.18);
    --bear-fill: rgb(235 87 87 / 0.18);
    /* Type */
    --font-sans: 'Geist', system-ui, -apple-system, 'PingFang TC', 'Noto Sans TC', sans-serif;
    --font-mono: 'Geist Mono', ui-monospace, 'SF Mono', Menlo, monospace;
    /* Spacing 4pt */
    --s-1:4px; --s-2:8px; --s-3:12px; --s-4:16px; --s-5:24px; --s-6:32px;
    /* Radius */
    --r:6px; --r-sm:4px; --r-xs:2px;
    /* Elevation */
    --shadow-card: 0 2px 4px 0 rgb(0 0 0 / 0.4);
    --b: 1px solid var(--line);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:var(--bg); color:var(--fg);
    font-family:var(--font-sans); font-size:14px;
    font-feature-settings:'ss01','cv11';
    letter-spacing:-0.011em;
    -webkit-font-smoothing:antialiased;
  }
  .pos { color:var(--bull); } .neg { color:var(--bear); }
  .mono { font-family:var(--font-mono); font-variant-numeric:tabular-nums; }

  /* === Symbol bar (mobile-first: top tabs) === */
  .app-layout { display:block; }
  .symbol-bar { display:grid; grid-template-columns:repeat(2, 1fr); gap:var(--s-2); padding:var(--s-4) var(--s-5) var(--s-2); align-items:stretch; }
  .sym-btn {
    background:var(--surface); border:1px solid var(--line); color:var(--fg-2);
    padding:var(--s-3); border-radius:var(--r);
    cursor:pointer; transition:background .15s ease-out, border-color .15s ease-out;
    display:flex; flex-direction:column; align-items:stretch; gap:var(--s-3);
    font-family:var(--font-sans); text-align:left;
  }
  .sym-btn:hover { background:var(--surface-2); border-color:#2a2c31; }
  .sym-btn.active { border-color:var(--accent); }
  .sym-btn .sym-name {
    font-family:var(--font-sans); font-weight:600;
    font-size:20px; line-height:1; letter-spacing:-0.022em;
    color:var(--fg);
  }
  .sym-btn .sym-sec { display:flex; flex-direction:column; gap:4px; min-width:0; }
  .sym-btn .sym-sec-label {
    color:var(--fg-3); font-size:12px; font-weight:500;
    letter-spacing:0.01em; line-height:1.2;
  }
  .sym-btn .sym-sec-row {
    display:flex; align-items:baseline; gap:6px; flex-wrap:wrap;
  }
  .sym-btn .sym-sec-val {
    font-family:var(--font-mono); font-variant-numeric:tabular-nums;
    font-size:16px; font-weight:500; line-height:1.1;
    color:var(--fg); letter-spacing:-0.01em;
  }
  .sym-btn .sym-sec-val.pos { color:var(--bull); }
  .sym-btn .sym-sec-val.neg { color:var(--bear); }
  .sym-btn .sym-sec-chg {
    font-family:var(--font-mono); font-variant-numeric:tabular-nums;
    font-size:14px; font-weight:500; color:var(--fg-3);
  }
  .sym-btn .sym-sec-chg.pos { color:var(--bull); }
  .sym-btn .sym-sec-chg.neg { color:var(--bear); }
  .sym-btn.no-data { opacity:0.35; cursor:not-allowed; }
  .sym-btn.no-data:hover { background:var(--surface); border-color:var(--line); }

  /* === Desktop sidebar (≥ 768px) === */
  @media (min-width: 768px) {
    .app-layout {
      display:grid;
      grid-template-columns: 260px 1fr;
      align-items:start;
    }
    .symbol-bar {
      display:flex; flex-direction:column; flex-wrap:nowrap;
      gap:var(--s-3);
      padding:var(--s-4) var(--s-3) var(--s-4) var(--s-4);
      position:sticky; top:0;
      min-height:100dvh; max-height:100dvh; overflow-y:auto;
      border-right:1px solid var(--line);
    }
    .symbol-bar .sym-btn {
      width:100%; padding:var(--s-4); gap:var(--s-4);
    }
    .symbol-bar .sym-btn .sym-name { font-size:20px; line-height:1; }
    .symbol-bar .sym-btn .sym-sec { gap:6px; }
    .symbol-bar .sym-btn .sym-sec-label { font-size:12px; }
    .symbol-bar .sym-btn .sym-sec-val { font-size:24px; }
    .symbol-bar .sym-btn .sym-sec-chg { font-size:13px; }
    .main-content { min-width:0; }
  }

  /* === Header === */
  .header { padding:var(--s-3) var(--s-5) var(--s-3); display:flex; align-items:baseline; gap:var(--s-4); flex-wrap:wrap; }
  .header h1 {
    font-size:24px; font-weight:600; color:var(--fg);
    letter-spacing:-0.022em; line-height:1.33;
  }
  .header .price {
    font-family:var(--font-mono); font-variant-numeric:tabular-nums;
    font-size:32px; font-weight:500; letter-spacing:-0.022em;
  }
  .header .change {
    font-size:14px; font-weight:500;
    font-variant-numeric:tabular-nums;
  }
  .header .meta {
    font-family:var(--font-mono); font-variant-numeric:tabular-nums;
    color:var(--fg-3); font-size:11px;
  }

  /* === KPI cards (under time tabs, with window-relative change%) === */
  .stats-cards {
    display:grid; grid-template-columns:repeat(4, 1fr);
    gap:var(--s-2); padding:0 var(--s-5) var(--s-5);
  }
  .stat-card {
    background:var(--surface); border:1px solid var(--line); border-radius:var(--r-md);
    padding:var(--s-3) var(--s-4);
    display:flex; flex-direction:column; gap:6px; min-width:0;
  }
  .stat-card .label {
    color:var(--fg-3); font-size:11px; font-weight:500;
    text-transform:uppercase; letter-spacing:0.06em; line-height:1;
  }
  .stat-card .value {
    font-family:var(--font-mono); font-variant-numeric:tabular-nums;
    color:var(--fg); font-size:22px; font-weight:500; line-height:1.15;
  }
  .stat-card .change {
    font-family:var(--font-mono); font-variant-numeric:tabular-nums;
    font-size:11px; line-height:1; color:var(--fg-3);
  }
  .stat-card .value.pos  { color:var(--bull); }
  .stat-card .value.neg  { color:var(--bear); }
  .stat-card .change.pos { color:var(--bull); }
  .stat-card .change.neg { color:var(--bear); }

  /* === Refresh bar === */
  .refresh-bar { padding:0 var(--s-5) var(--s-2); display:flex; align-items:center; gap:var(--s-2); flex-wrap:wrap; }
  .refresh-bar .dot { width:6px; height:6px; border-radius:50%; animation:pulse 3s infinite ease-in-out; }
  .refresh-bar .dot.ok { background:var(--accent); box-shadow:0 0 6px rgb(228 242 34 / 0.45); }
  .refresh-bar .dot.warn { background:var(--amber); }
  .refresh-bar .dot.stale { background:var(--bear); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .refresh-bar span {
    color:var(--fg-3); font-size:11px;
    font-family:var(--font-mono); font-variant-numeric:tabular-nums;
  }
  .refresh-bar .ago { font-weight:500; color:var(--fg-2); }
  .refresh-bar .ago.warn { color:var(--amber); }
  .refresh-bar .ago.stale { color:var(--bear); }

  /* === Time selector (button row, evenly distributed) === */
  .time-selector { display:flex; gap:var(--s-2); padding:0 var(--s-5) var(--s-3); margin-bottom:var(--s-3); }
  .time-btn {
    flex:1;
    background:var(--surface); border:1px solid var(--line); color:var(--fg-2);
    padding:var(--s-2) var(--s-3); cursor:pointer;
    font-family:var(--font-mono); font-size:16px; font-weight:500;
    letter-spacing:0.06em; text-transform:uppercase;
    border-radius:var(--r-sm); text-align:center;
    transition:background .15s ease-out, color .15s ease-out, border-color .15s ease-out;
  }
  .time-btn:hover { color:var(--fg); background:var(--surface-2); border-color:#2a2c31; }
  .time-btn.active { background:var(--accent); border-color:var(--accent); color:var(--accent-fg); }

  /* === Chart grid + cards === */
  .charts-grid { display:grid; grid-template-columns:1fr 1fr; gap:var(--s-2); padding:0 var(--s-5) var(--s-5); }
  @media(max-width:900px){ .charts-grid{grid-template-columns:1fr;} }
  .chart-card {
    background:var(--surface); border:var(--b);
    border-radius:var(--r); padding:var(--s-3);
    min-height:300px; position:relative;
    box-shadow:var(--shadow-card);
    transition:background .2s ease-out;
  }
  .chart-card:hover { background:var(--surface-2); }
  .chart-card.full { grid-column:1/-1; }
  .chart-card h3 {
    font-size:16px; font-weight:590; color:var(--fg);
    letter-spacing:-0.011em; line-height:1.4;
    padding-bottom:var(--s-2); margin-bottom:var(--s-2);
    border-bottom:1px solid var(--line-soft);
  }
  .chart-card .desc {
    font-size:12px; color:var(--fg-3); line-height:1.5;
    margin-bottom:var(--s-3);
  }
  .chart-card .desc code {
    font-family:var(--font-mono); font-size:11px;
    background:var(--surface-2); padding:1px 5px;
    border-radius:var(--r-sm); color:var(--fg-2);
  }
  .chart-card .desc b { color:var(--fg-2); font-weight:500; }

  /* === Tooltip === */
  .tt {
    position:absolute; z-index:100; top:56px; left:var(--s-3);
    background:rgb(15 16 17 / 0.96); border:1px solid var(--line);
    border-radius:var(--r); padding:var(--s-2) var(--s-3);
    font-size:11px; pointer-events:none;
    backdrop-filter:blur(12px) saturate(120%);
    -webkit-backdrop-filter:blur(12px) saturate(120%);
    box-shadow:var(--shadow-card);
    min-width:172px; line-height:1.5; display:none;
  }
  .tt .tt-time {
    color:var(--fg-3); font-size:10px; margin-bottom:4px;
    font-family:var(--font-mono); font-variant-numeric:tabular-nums;
  }
  .tt .tt-row { display:flex; justify-content:space-between; gap:var(--s-3); }
  .tt .tt-l { color:var(--fg-3); }
  .tt .tt-v {
    font-family:var(--font-mono); font-variant-numeric:tabular-nums;
    color:var(--fg); font-weight:500;
  }

  /* === Info / glossary section === */
  .info-section {
    margin:0 var(--s-5) var(--s-6);
    background:var(--surface); border:var(--b);
    border-radius:var(--r); padding:var(--s-5);
    box-shadow:var(--shadow-card);
  }
  .info-section h2 {
    font-size:20px; font-weight:590; color:var(--fg);
    letter-spacing:-0.011em; line-height:1.33; margin-bottom:var(--s-2);
  }
  .info-section .info-sub { font-size:13px; color:var(--fg-2); margin-bottom:var(--s-5); line-height:1.5; }
  .info-section h3 {
    font-size:13px; font-weight:590; color:var(--fg);
    text-transform:uppercase; letter-spacing:0.04em;
    margin:var(--s-5) 0 var(--s-3); line-height:1.4;
  }
  .info-section h3:first-of-type { margin-top:var(--s-3); }
  .info-section p, .info-section li { font-size:16px; color:var(--fg-2); line-height:1.6; }
  .info-section ul { padding-left:20px; }
  .info-section table {
    width:100%; max-width:920px; border-collapse:collapse;
    margin:var(--s-1) 0 var(--s-2); font-size:13px;
  }
  .info-section th, .info-section td {
    text-align:left; padding:var(--s-2) var(--s-3);
    border:none; border-bottom:1px solid var(--line-soft);
    vertical-align:top; line-height:1.5;
  }
  .info-section th {
    color:var(--fg-3); font-size:10px; font-weight:500;
    text-transform:uppercase; letter-spacing:0.06em;
    background:transparent; padding-bottom:var(--s-2);
  }
  .info-section td { color:var(--fg-2); }
  .info-section tbody tr:nth-child(even) td { background:rgb(22 23 24 / 0.5); }
  .info-section tbody tr:last-child td { border-bottom:none; }
  .info-section code {
    font-family:var(--font-mono); font-size:12px;
    background:var(--surface-2); padding:2px 6px;
    border-radius:var(--r-sm); color:var(--fg);
  }
  .info-section b { color:var(--fg); font-weight:590; }
  .info-section .warn {
    background:oklch(0.78 0.10 75 / 0.06);
    border:1px solid oklch(0.78 0.10 75 / 0.25);
    border-radius:var(--r); padding:var(--s-3) var(--s-4);
    margin-top:var(--s-4); color:oklch(0.85 0.08 75);
    font-size:13px; line-height:1.6;
  }

  /* === Chart container === */
  .chart-container { width:100%; height:260px; }
  .chart-container.tall { height:340px; }

  /* === Loading === */
  .loading { display:flex; align-items:center; justify-content:center; height:100dvh; font-size:14px; color:var(--fg-3); font-family:var(--font-mono); }
  .loader, .loader:before, .loader:after {
    border-radius:50%; width:2.5em; height:2.5em;
    animation-fill-mode:both;
    animation:bblFadInOut 1.8s infinite ease-in-out;
  }
  .loader {
    color:var(--accent);
    font-size:7px;
    position:relative; text-indent:-9999em;
    transform:translateZ(0);
    animation-delay:-0.16s;
  }
  .loader:before, .loader:after { content:''; position:absolute; top:0; }
  .loader:before { left:-3.5em; animation-delay:-0.32s; }
  .loader:after  { left:3.5em; }
  @keyframes bblFadInOut {
    0%, 80%, 100% { box-shadow:0 2.5em 0 -1.3em; }
    40%           { box-shadow:0 2.5em 0 0; }
  }

  /* === Card entrance (subtle stagger) === */
  @keyframes card-in {
    from { opacity:0; transform:translateY(4px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .chart-card, .info-section {
    animation:card-in 220ms ease-out both;
    animation-delay:calc(var(--i,0) * 30ms);
  }

  /* === Focus ring === */
  :focus-visible { outline:2px solid var(--accent); outline-offset:2px; border-radius:var(--r-sm); }
  button:focus-visible { outline-offset:3px; }

  /* === RWD: mobile-first cascade === */
  @media (max-width: 600px) {
    body { font-size: 15px; }
    .symbol-bar { padding: var(--s-3) var(--s-3) var(--s-1); gap: var(--s-1); }
    .sym-btn { padding: var(--s-2); }
    .sym-btn .sym-name { font-size: 12px; }
    .sym-btn .sym-price { font-size: 10px; }
    .header { padding: var(--s-2) var(--s-3); gap: var(--s-2); }
    .header h1 { font-size: 18px; }
    .header .price { font-size: 24px; }
    .header .change { font-size: 13px; }
    .stats-cards { grid-template-columns: repeat(2, 1fr); padding: 0 var(--s-3) var(--s-4); gap: var(--s-2); }
    .stat-card { padding: var(--s-2) var(--s-3); gap: 4px; }
    .stat-card .value { font-size: 18px; }
    .stat-card .label { font-size: 10px; }
    .refresh-bar { padding: 0 var(--s-3) var(--s-2); }
    .time-selector { display: grid; grid-template-columns: repeat(3, 1fr); padding: 0 var(--s-3) var(--s-3); gap: var(--s-1); }
    .time-btn { padding: var(--s-2) 2px; min-height: 36px; width: 100%; text-align:center; }
    .charts-grid { padding: 0 var(--s-3) var(--s-4); gap: var(--s-2); }
    .charts-grid > * { min-width: 0; }
    .chart-card { padding: var(--s-3); min-height: auto; min-width: 0; overflow: hidden; }
    .chart-container { max-width: 100%; height: 220px; }
    .chart-container.tall { height: 280px; }
    .chart-card h3 { font-size: 14px; }
    .chart-card .desc { font-size: 11px; }
    .info-section { margin: 0 var(--s-3) var(--s-5); padding: var(--s-4); }
    .info-section h2 { font-size: 17px; }
    .info-section h3 { font-size: 12px; }
    .info-section p, .info-section li { font-size: 13px; }
    .info-section .info-sub { font-size: 12px; }
    .info-section .warn { font-size: 12px; }
    /* Glossary table → card layout on mobile */
    .info-section table { display: block; max-width: 100%; font-size: 12px; }
    .info-section thead { display: none; }
    .info-section tbody, .info-section tr { display: block; }
    .info-section tbody tr:nth-child(even) td { background: transparent; }
    .info-section tr {
      border: 1px solid var(--line); border-radius: var(--r);
      padding: var(--s-3); margin-bottom: var(--s-2);
      background: var(--surface-2);
    }
    .info-section td { display: block; padding: var(--s-1) 0; border: none; }
    .info-section td:first-child {
      color: var(--fg); font-weight: 590;
      padding-bottom: var(--s-2); margin-bottom: var(--s-1);
      border-bottom: 1px solid var(--line-soft);
    }
    .info-section td:not(:first-child)::before {
      content: attr(data-label);
      display: block; color: var(--fg-3);
      font-size: 10px; font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.06em;
      margin-top: var(--s-2); margin-bottom: 2px;
    }
  }
  @media (max-width: 400px) {
    .header .price { font-size: 22px; }
    .header h1 { font-size: 16px; }
    .chart-container { height: 200px; }
    .chart-container.tall { height: 260px; }
  }

  /* === Reduced motion === */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
    .refresh-bar .dot { animation: none; }
  }
</style>
</head>
<body>
<div id="app"><div class="loading"><span class="loader" role="status" aria-label="Loading"></span></div></div>
<script>
let allData=[], chartReg={}, currentHours=24, syncing=false, rangeSyncing=false, timeIdx={};
let currentSymbol='btc', symbolList=[];

// Chart palette — sourced from :root CSS tokens (Linear-aligned).
// LightweightCharts can't read CSS vars, so we resolve once at boot.
const _CV = (k) => getComputedStyle(document.documentElement).getPropertyValue(k).trim();
const CHART = {
  bull:   _CV('--bull')   || '#27a644',
  bear:   _CV('--bear')   || '#eb5757',
  blue:   _CV('--blue')   || '#5e6ad2',
  cyan:   _CV('--cyan')   || '#02b8cc',
  violet: _CV('--violet') || CHART.violet,
  amber:  '#d6a247', // approx of oklch(0.78 0.10 75); lightweight-charts can't parse oklch
  line:   _CV('--line')   || '#23252a',
  fg2:    _CV('--fg-2')   || '#8a8f98',
  fg3:    _CV('--fg-3')   || '#62666d',
  grid:        'rgba(255,255,255,0.05)',
  fgDim:       'rgba(247,248,248,0.6)',
  bullArea25:  'rgba(39,166,68,0.25)',
  bullArea02:  'rgba(39,166,68,0.02)',
  bullArea45:  'rgba(39,166,68,0.40)',
  bearArea45:  'rgba(235,87,87,0.40)',
  cyanArea25:  'rgba(2,184,204,0.25)',
  cyanArea02:  'rgba(2,184,204,0.02)',
  fundingPos:  'rgba(235,87,87,0.75)',
  fundingNeg:  'rgba(39,166,68,0.75)',
};

// Get symbol from URL or default
const urlParams=new URLSearchParams(window.location.search);
if(urlParams.get('symbol')) currentSymbol=urlParams.get('symbol').toLowerCase();

const DATA_BASE='/data';
const HIDDEN_SYMBOLS=new Set(['siren','rave','pippin','beat','power']);
async function fetchSymRecent(sym){
  // Fetch last 2 days of NDJSON for sym → return {latest, prev24h}.
  // prev24h is the row closest to (latest_ts - 24h).
  try{
    const idx=await (await fetch(`${DATA_BASE}/${sym}/days/index.json`)).json();
    if(!Array.isArray(idx)||!idx.length) return null;
    const days=idx.slice(-2);
    const shards=await Promise.all(days.map(async d=>{
      const txt=await (await fetch(`${DATA_BASE}/${sym}/days/${d}.ndjson`)).text();
      return txt.split('\n').filter(Boolean).map(l=>{try{return JSON.parse(l);}catch{return null;}}).filter(Boolean);
    }));
    const all=shards.flat();
    if(!all.length) return null;
    const latest=all[all.length-1];
    const latestTs=new Date(latest.timestamp.replace(' ','T')+':00+08:00').getTime();
    const targetTs=latestTs-24*3600*1000;
    let prev=null, bestDiff=Infinity;
    for(const r of all){
      if(r===latest) continue;
      const ts=new Date(r.timestamp.replace(' ','T')+':00+08:00').getTime();
      const diff=Math.abs(ts-targetTs);
      if(diff<bestDiff){bestDiff=diff; prev=r;}
    }
    return {latest, prev24h:prev};
  }catch{return null;}
}
async function fetchSymbols(){
  const list=await (await fetch(`${DATA_BASE}/symbols.json`)).json();
  const filtered=list.filter(s=>!HIDDEN_SYMBOLS.has(s.symbol.toLowerCase()))
    .sort((a,b)=>(a.symbol.toLowerCase()==='river')-(b.symbol.toLowerCase()==='river'));
  await Promise.all(filtered.map(async s=>{
    if(!s.has_data) return;
    const r=await fetchSymRecent(s.symbol);
    if(!r||!r.latest) return;
    if(s.sm_ls_ratio==null && r.latest.sm_ls_ratio!=null) s.sm_ls_ratio=r.latest.sm_ls_ratio;
    if(r.prev24h && r.latest.sm_ls_ratio!=null && r.prev24h.sm_ls_ratio!=null){
      const cur=Number(r.latest.sm_ls_ratio), old=Number(r.prev24h.sm_ls_ratio);
      if(isFinite(cur)&&isFinite(old)&&old!==0) s.sm_ls_chg_pct=(cur-old)/Math.abs(old)*100;
    }
  }));
  return filtered;
}
async function fetchData(h){
  const idxRes=await fetch(`${DATA_BASE}/${currentSymbol}/days/index.json`);
  if(!idxRes.ok) return [];
  const allDates=await idxRes.json();
  if(!Array.isArray(allDates)||!allDates.length) return [];
  const dates=(h>=9999||!h)?allDates:allDates.slice(-(Math.ceil(h/24)+1));
  const shards=await Promise.all(dates.map(async d=>{
    const r=await fetch(`${DATA_BASE}/${currentSymbol}/days/${d}.ndjson`);
    if(!r.ok) return [];
    const text=await r.text();
    return text.split('\n').filter(Boolean).map(line=>{
      try{return JSON.parse(line);}catch{return null;}
    }).filter(Boolean);
  }));
  const data=shards.flat();
  if(h>=9999||!h) return data;
  const cutoff=Date.now()-(h*3600*1000);
  return data.filter(d=>new Date(d.timestamp.replace(' ','T')+':00+08:00').getTime()>=cutoff);
}

function fmt(v,d=2){ if(v==null||v==='')return'—'; const n=Number(v); return isNaN(n)?v:n.toFixed(d); }
function fmtCompact(v){
  const n=Number(v); if(!isFinite(n)) return '—';
  const a=Math.abs(n);
  if(a>=1e9) return (n/1e9).toFixed(2)+'B';
  if(a>=1e6) return (n/1e6).toFixed(2)+'M';
  if(a>=1e3) return (n/1e3).toFixed(2)+'K';
  return n.toFixed(2);
}
function timeAgo(tsStr){
  // tsStr like "2026-04-01 16:51" in UTC+8
  const d=new Date(tsStr.replace(' ','T')+':00+08:00');
  const now=Date.now();
  const diff=Math.max(0,Math.floor((now-d.getTime())/1000));
  if(diff<60) return {text:'剛剛',level:'ok'};
  if(diff<3600) return {text:`${Math.floor(diff/60)}分鐘前`,level:diff>1200?'warn':'ok'};
  if(diff<86400) return {text:`${Math.floor(diff/3600)}小時${Math.floor((diff%3600)/60)}分前`,level:'stale'};
  return {text:`${Math.floor(diff/86400)}天前`,level:'stale'};
}
function fmtPrice(v){
  const n=Number(v); if(isNaN(n)) return '—';
  if(n>=1000) return n.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
  if(n>=1) return n.toFixed(3);
  if(n>=0.01) return n.toFixed(4);
  return n.toFixed(6);
}
function fmtPriceAxis(v){
  const s=fmtPrice(v);
  if(s==='—'||!s.includes('.')) return s;
  return s.replace(/\.?0+$/,'');
}
// Chart time only. Timestamps are Taipei wall-clock; parse them as if UTC so
// lightweight-charts' UTC axis displays Taipei time. Values stay self-consistent
// across series/timeIdx/crosshair; tooltips show the original d.timestamp string.
// (Do NOT reuse for real-time filtering — fetchData/fetchSymRecent parse +08:00.)
function parseTime(ts){ return Math.floor(new Date(ts.replace(' ','T')+':00+00:00').getTime()/1000); }
function buildTimeIndex(data){ timeIdx={}; data.forEach((d,i)=>{ timeIdx[parseTime(d.timestamp)]=i; }); }
function dedup(arr){ const seen={}; return arr.filter(d=>{ if(isNaN(d.time)||seen[d.time]) return false; seen[d.time]=1; return true; }); }

function pctChange(rows, key){
  if(!rows || rows.length<2) return null;
  const cur=Number(rows[rows.length-1]?.[key]);
  const base=Number(rows[0]?.[key]);
  if(!isFinite(cur) || !isFinite(base) || base===0) return null;
  return ((cur-base)/Math.abs(base))*100;
}

function syncAll(sourceId, time){
  if(syncing) return;
  syncing=true;
  for(const [id,info] of Object.entries(chartReg)){
    if(id!==sourceId){
      if(time){
        const seriesData=info.seriesDataMap&&info.seriesDataMap[time];
        const price=seriesData!=null?seriesData:0;
        info.chart.setCrosshairPosition(price, time, info.firstSeries);
      } else {
        info.chart.clearCrosshairPosition();
      }
    }
    showTooltip(id, time);
  }
  syncing=false;
}

function reg(id, chart, containerId, fields, firstSeries, firstSeriesData){
  const card=document.getElementById(containerId).closest('.chart-card');
  const tt=document.createElement('div');
  tt.className='tt';
  card.appendChild(tt);
  const seriesDataMap={};
  if(firstSeriesData) firstSeriesData.forEach(d=>{ seriesDataMap[d.time]=d.value; });
  chartReg[id]={chart, tooltipEl:tt, fields, firstSeries, seriesDataMap};
  chart.subscribeCrosshairMove(p=>{ if(!syncing) syncAll(id, p.time||null); });
  chart.timeScale().subscribeVisibleTimeRangeChange(range=>{
    // Only the master ('price') chart broadcasts its window. Otherwise a chart
    // with a sparse series (e.g. Order Book Depth, which can have only the last
    // few points) would clamp every chart to its narrow fitContent() range.
    if(rangeSyncing||!range||id!=='price') return;
    rangeSyncing=true;
    for(const [oid,info] of Object.entries(chartReg)){
      if(oid===id) continue;
      try{ info.chart.timeScale().setVisibleRange(range); }catch(e){}
    }
    rangeSyncing=false;
  });
}

    // and emits a visibleRangeChange — a sparse series (e.g. depth) would fit to
    // a sliver and broadcast that narrow window to everyone. Running our
    // full-range set one frame later makes it the final, authoritative word.
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      rangeSyncing=true;
      for(const [oid,info] of Object.entries(chartReg)){
        try{ info.chart.timeScale().setVisibleRange(fullRange); }catch(e){}
      }
      rangeSyncing=false;
    }));
  }
}

function renderPage(data){

  const ago=timeAgo(latest.timestamp);

    <div class="app-layout">

    <main class="main-content">
    ${renderHeader(latest)}
    <div class="refresh-bar"><div class="dot ${ago.level}"></div><span>最近數據：<span class="ago ${ago.level}">${ago.text}</span> (${latest.timestamp} UTC+8) · ${data.length} pts · 數據每15分鐘收集 · 頁面每5分鐘刷新</span></div>

      <div class="chart-card full" style="--i:1"><h3>Smart Money Positions (M USDT)</h3><div class="desc">來源：幣安 Smart Money <code>bapi/futures/v1/.../smart-money/signal/overview</code> 的 <code>longTradersQty</code> × 即時價｜定義：全體「聰明錢」（幣安內部演算法篩選的高勝率交易員，入選門檻未公開）Long / Short 持倉名義價值（M USDT）</div><div id="chart-positions" class="chart-container"></div></div>
      <div class="chart-card full" style="--i:2"><h3>Long/Short Ratios</h3><div class="desc">來源：<code>globalLongShortAccountRatio</code>（全市場帳戶比）+ <code>topLongShortPositionRatio</code>（大戶持倉比，1h）｜定義：「大戶」= 幣安官方定義的<b>持倉量前 20% 帳戶</b>（與聰明錢/鯨魚是不同集合）；圖表為這兩種多空比的對比</div><div id="chart-ls" class="chart-container"></div></div>
      <div class="chart-card" style="--i:3"><h3>Whale Count</h3><div class="desc">來源：Smart Money <code>overview.longWhales / shortWhales</code>｜定義：聰明錢中<b>持倉規模特別大</b>的子集（聰明錢 ∩ 鯨魚）的當前 Long / Short 帳戶數；具體 USDT 門檻幣安未公開，並非全市場鯨魚</div><div id="chart-whales" class="chart-container"></div></div>

      <div class="chart-card" style="--i:5"><h3>Funding Rate</h3><div class="desc">來源：<code>fapi/v1/fundingRate</code> + <code>futures/data/takerlongshortRatio</code>｜定義：合約資金費率（%，正=多付空）與主動成交（吃單）的買賣量比</div><div id="chart-funding" class="chart-container"></div></div>
      <div class="chart-card" style="--i:6"><h3>Order Book Depth (K USDT)</h3><div class="desc">來源：<code>fapi/v1/depth?limit=20</code>｜定義：訂單簿前 20 檔的 Bid / Ask 名義總額（K USDT）、Bid/Ask 比值與最大買賣牆價位</div><div id="chart-depth" class="chart-container"></div></div>
      <div class="chart-card" style="--i:7"><h3>On-chain Holders</h3><div class="desc">來源：幣安 Web3 <code>bapi/defi/v4/.../wallet/market/token/dynamic/info</code>｜定義：鏈上 token 持有人數、Top10 集中度、Smart Money 持有人、流動池規模</div><div id="chart-onchain" class="chart-container"></div></div>

    <div class="info-section" style="--i:8">
      <h2>名詞與數據定義</h2>
      <div class="info-sub">釐清「聰明錢 / 鯨魚 / 大戶」三個容易搞混的概念，以及每張圖表的具體計算方式。</div>

      <h3>三種「精英帳戶」的差別</h3>
      <table>
        <thead><tr><th style="width:18%">名詞</th><th style="width:42%">資料來源</th><th>幣安定義</th></tr></thead>
        <tbody>
          <tr><td><b>聰明錢</b><br>Smart Money / Traders</td><td data-label="資料來源"><code>smart-money/signal/overview</code> 的 <code>longTraders</code> / <code>shortTraders</code></td><td data-label="幣安定義">幣安內部演算法篩選的「高勝率交易員」群體。<b>具體入選門檻官方未公開</b>，一般理解為長期高勝率 + 高 PnL 的帳戶集合。</td></tr>
          <tr><td><b>鯨魚</b><br>Whales</td><td data-label="資料來源">同上 <code>longWhales</code> / <code>shortWhales</code></td><td data-label="幣安定義">上述聰明錢中<b>持倉規模特別大</b>的子集（聰明錢 ∩ 鯨魚）。具體 USDT 門檻官方<b>未公開</b>。<b>不是</b>全市場鯨魚。</td></tr>
          <tr><td><b>大戶</b><br>Top Traders</td><td data-label="資料來源"><code>topLongShortPositionRatio</code> / <code>topLongShortAccountRatio</code></td><td data-label="幣安定義">幣安官方定義：<b>合約持倉量前 20% 的帳戶</b>。純按持倉大小排，不論勝率 — 可能虧錢的大戶也算。<b>與聰明錢、鯨魚是完全不同的集合。</b></td></tr>
        </tbody>
      </table>

      <h3>各圖表的數據定義</h3>
      <table>
        <thead><tr><th style="width:22%">圖表</th><th style="width:38%">API 來源</th><th>定義 / 計算方式</th></tr></thead>
        <tbody>
          <tr><td>Price &amp; Open Interest</td><td data-label="API 來源"><code>fapi/v1/ticker/24hr</code><br><code>fapi/v1/openInterest</code></td><td data-label="定義 / 計算方式">合約最新成交價；全市場未平倉合約名義價值（OI × Price，M USDT）。</td></tr>
          <tr><td>Smart Money Positions</td><td data-label="API 來源"><code>smart-money/signal/overview</code></td><td data-label="定義 / 計算方式"><b>全體聰明錢</b> Long / Short 持倉的名義價值 = <code>longTradersQty</code> × 即時價（M USDT）。</td></tr>
          <tr><td>Long/Short Ratios</td><td data-label="API 來源"><code>globalLongShortAccountRatio</code><br><code>topLongShortPositionRatio</code></td><td data-label="定義 / 計算方式">全市場帳戶數的多空比 vs <b>大戶（前 20%）</b>持倉的多空比。注意這裡的「大戶」<b>不是</b>聰明錢。</td></tr>
          <tr><td>Whale Count</td><td data-label="API 來源"><code>overview.longWhales</code><br><code>overview.shortWhales</code></td><td data-label="定義 / 計算方式"><b>聰明錢中的鯨魚帳戶數</b>（聰明錢 ∩ 鯨魚），即聰明錢之中持倉規模特別大的那一撮。<b>不是</b>全市場鯨魚數。</td></tr>
          <tr><td>Profit Rate</td><td data-label="API 來源"><code>overview.longTradersAvgEntryPrice</code> + 即時價</td><td data-label="定義 / 計算方式"><b>全體聰明錢</b>（非「大戶」、非「鯨魚」）Long / Short 倉位的未實現盈虧 %。<br>公式：(即時價 − 平均進場價) / 平均進場價 × 100%</td></tr>
          <tr><td>Funding Rate</td><td data-label="API 來源"><code>fapi/v1/fundingRate</code><br><code>futures/data/takerlongshortRatio</code></td><td data-label="定義 / 計算方式">合約資金費率（%，正值代表多方付給空方）；主動成交（吃單）的買賣量比。</td></tr>
          <tr><td>Order Book Depth</td><td data-label="API 來源"><code>fapi/v1/depth?limit=20</code></td><td data-label="定義 / 計算方式">訂單簿前 20 檔 Bid / Ask 名義總額（K USDT）、Bid/Ask 比值與最大買賣牆價位。</td></tr>
          <tr><td>On-chain Holders</td><td data-label="API 來源">幣安 Web3 <code>wallet/market/token/dynamic/info</code></td><td data-label="定義 / 計算方式">鏈上 token 持有人數、Top10 持倉集中度、Smart Money 持有人、流動池規模（僅 BNB 等部分標的有此資料）。</td></tr>

      <div class="warn">

      </div>
    </div>
    </main>
    </div>`;
  buildTimeIndex(data);
  renderCharts(data);
}

async function switchSymbol(sym){
  currentSymbol=sym;
  // Update URL without reload
  const url=new URL(window.location);
  url.searchParams.set('symbol',sym);
  window.history.replaceState({},'',url);
  document.title=sym.toUpperCase()+'/USDT Dashboard';
  allData=await fetchData(currentHours);
  renderPage(allData);
}

async function switchTime(h){
  currentHours=h;
  allData=await fetchData(h);
  renderPage(allData);
}

let refreshTimer=null, agoTimer=null;
function updateAgoDisplay(){
  if(!allData.length) return;
  const latest=allData[allData.length-1];
  const ago=timeAgo(latest.timestamp);
  const dotEl=document.querySelector('.refresh-bar .dot');
  const agoEl=document.querySelector('.refresh-bar .ago');
  if(dotEl){ dotEl.className='dot '+ago.level; }
  if(agoEl){ agoEl.className='ago '+ago.level; agoEl.textContent=ago.text; }
}
(async()=>{
  try{
    symbolList=await fetchSymbols();
    // If current symbol has no data, pick first with data
    const cur=symbolList.find(s=>s.symbol===currentSymbol);
    if(!cur||!cur.has_data){
      const first=symbolList.find(s=>s.has_data);
      if(first) currentSymbol=first.symbol;
    }
    document.title=currentSymbol.toUpperCase()+'/USDT Dashboard';
    allData=await fetchData(currentHours);
    renderPage(allData);
    // Refresh data + symbol prices every 5min
    refreshTimer=setInterval(async()=>{
      symbolList=await fetchSymbols();
      allData=await fetchData(currentHours);
      renderPage(allData);
    },5*60*1000);
    // Update "ago" text every 30s
    agoTimer=setInterval(updateAgoDisplay, 30*1000);
  }catch(e){document.getElementById('app').innerHTML=`<div class="loading">Error: ${e.message}</div>`;}
})();
</script>
